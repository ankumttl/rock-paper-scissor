<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1 class="heading">ROCK PAPER SCISSORS GAME</h1>
    </header>
    <main>
        <div class="images">
            <img class="choice" id="rock" src="images/rock.png" alt="rock">
            <img class="choice" id="paper" src="images/paper.png" alt="paper">
            <img class="choice" id="scissors" src="images/scissors.png" alt="scissors">
        </div>
        <div class="score-board">
            <div class="score">
                <p id="user-score">0</p>
                <p><b>YOU</b></p>
            </div>
            <div class="score">
                <p id="comp-score">0</p>
                <p><b>COMP</b></p>
            </div>
        </div>
        <div class="msg-container">
            <p id="msg">Make your move!</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
